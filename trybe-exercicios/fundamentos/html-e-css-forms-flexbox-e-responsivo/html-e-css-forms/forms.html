<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrybeTrip</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="open">
<h1>TrybeTrip</h1>
<p><em>Qual o seu proximo destino ?</em></p>
    </header>
<form action="" method="get">

    <div class="acima">
        <fieldset class="nome">
            Nome:<input type="name" name="acima" placeholder="Digite seu nome completo" id="acima">
            <label for="name"></label>
            <br>
            E-mail<input type="email" name="acima" id="acima" placeholder="Digite seu e-mail">
            <label for="seuemail"></label>
       
    </div>
<div class="radius">
    <p><em> Destino Preferido:</em></p>
<input type="radio" name="local" id="" value="cidade">
<label for="cidade">Cidade</label>
<input type="radio" name="local" id="" value="campo">
<label for="campo">Campo</label>
<input type="radio" name="local" id="" value="Praia">
<label for="praia">Praia</label>
<input type="radio" name="local" id="" value="Montanha">
<label for="montanha">Montanha</label>
</div>

<div class="porque">
<p><em>Por que você deveria ser a pessoa desenvolvedora a ganhar o concurso TrybeTrip? </em></p>
 <textarea name="porque" id="" cols="20" rows="15" placeholder="Descreva em 500 caracteres"></textarea>
</div>


<div class="date">
    <p><em>Qual a melhor data para realizar sua viagem?</em></p>
    <input type="date" name="data" id="">
    <label for="data"></label>

</div>
<br>

<div id="oportunidade">
<input type="checkbox" name="sim" id="">
<label for="sim">Gostaria de receber outras incríveis oportunidades oferecidas pela Trybe?</label>
<br>

<input type="checkbox" name="concordo" id="concordo">
<label for="concordo">Concordo que imagens das minhas férias poderão ser usadas na divulgação de concursos futuros.</label>
</div>

<div class="button">
    <input type="button" value="Enviar">
    <input type="reset" value="Limpar">
</div>

    </form>
    <script src="script2.js"></script>        
    </body>
</html>
